<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>MANAGER</title><link rel="stylesheet" href="styles.css"></head><body><header><div class="wrap row space"><div><div class="top-title">MANAGER</div><div id="welcome" class="small"></div></div><div class="row"><a href="manager.html" class="ghost">Manager</a><a href="board.html" class="ghost">บอร์ดรวม</a><button class="ghost" id="enablePushBtn">เปิดแจ้งเตือน</button><button class="ghost" id="logoutBtn">ออกจากระบบ</button></div></div></header><div class="wrap grid grid-2"><div class="panel"><div class="section-head"><h2 class="section-title">สร้าง / แก้ไขไอดี</h2><div id="firebaseStatus" class="firebase-inline"></div></div><form id="userForm" class="grid"><div><label>ชื่อพนักงาน</label><input id="name" required></div><div class="grid grid-3"><div><label>รหัส</label><input id="codeInput" required></div><div><label>Role</label><select id="role"><option value="fo">FO</option><option value="hk">HK</option><option value="fb">FB</option><option value="eng">ENG</option><option value="supervisor_hk">Supervisor HK</option><option value="supervisor_fb">Supervisor FB</option><option value="supervisor_eng">Supervisor ENG</option><option value="manager">Manager</option></select></div><div><label>Department</label><select id="department"><option>FO</option><option>HK</option><option>FB</option><option>ENG</option><option>MANAGEMENT</option></select></div></div><button class="good">บันทึกไอดี</button></form></div><div class="panel"><h2 class="section-title">รายชื่อไอดีทั้งหมด</h2><div id="userList"></div></div></div><div class="wrap"><div class="panel token-panel"><h2 class="section-title">สถานะเครื่องที่เปิดแจ้งเตือน</h2><div class="stats"><div class="stat"><div class="small">เครื่องทั้งหมด</div><div class="n" id="tokAll">0</div></div><div class="stat"><div class="small">HK</div><div class="n" id="tokHK">0</div></div><div class="stat"><div class="small">FB</div><div class="n" id="tokFB">0</div></div><div class="stat"><div class="small">ENG</div><div class="n" id="tokENG">0</div></div></div></div></div><script src="firebase-config.js"></script><script src="users-config.js"></script><script src="firebase-helpers.js"></script><script src="common.js"></script><script>const session=requireRole('manager');welcome.textContent='ผู้ใช้งาน: '+session.name;logoutBtn.onclick=logout;enablePushBtn.onclick=()=>enableNotificationsForCurrentUser(session,'firebaseStatus');
async function renderUsers(){const users=await getUsers();userList.innerHTML=users.map(u=>`<article class="task"><h4>${escapeHtml(u.name)}</h4><div class="meta">Code: ${escapeHtml(u.code)} • Role: ${escapeHtml(u.role)} • Department: ${escapeHtml(u.department)}</div><div class="actions"><button onclick="editUser('${u.code}')">แก้ไข</button><button class="bad" onclick="removeUser('${u.code}')">ลบ</button></div></article>`).join('')||'<div class="small">ยังไม่มีผู้ใช้</div>'}
window.editUser=async code=>{const users=await getUsers();const u=users.find(x=>x.code===code);if(!u)return;name.value=u.name;codeInput.value=u.code;role.value=u.role;department.value=u.department}
window.removeUser=async code=>{if(!confirm('ลบไอดีนี้?'))return;await deleteUser(code);await renderUsers()}
userForm.addEventListener('submit',async e=>{e.preventDefault();await upsertUser({code:codeInput.value.trim(),name:name.value.trim(),role:role.value,department:department.value});userForm.reset();await renderUsers()});
async function renderTokens(){const info=await loadTokenStatus();tokAll.textContent=info.tokens.length;tokHK.textContent=info.hk.length;tokFB.textContent=info.fb.length;tokENG.textContent=info.eng.length}
(async()=>{setFirebaseStatus('firebaseStatus','checking');const fb=await checkFirebaseConnection();if(fb.ok)setFirebaseStatus('firebaseStatus','connected',fb.detail);else setFirebaseStatus('firebaseStatus',fb.mode,fb.detail);await ensureUsers();await renderUsers();await renderTokens(); document.getElementById('firebaseStatus').innerHTML += ' <span class="small">Manager code เริ่มต้น = 9900</span>'})();</script></body></html>
