<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>LOG / REPORT</title><link rel="stylesheet" href="styles.css"></head><body><header><div class="wrap row space"><div><div class="top-title">LOG / REPORT</div><div id="welcome" class="small"></div></div><div class="row"><a href="board.html" class="ghost">บอร์ดรวม</a><button class="ghost" id="enablePushBtn">เปิดแจ้งเตือน</button><button class="ghost" id="logoutBtn">ออกจากระบบ</button></div></div></header><div class="wrap"><div id="firebaseStatus" class="firebase-inline" style="margin-bottom:14px;"></div><div class="stats"><div class="stat"><div class="small">งานปิดแล้วทั้งหมด</div><div class="n" id="rAll">0</div></div><div class="stat"><div class="small">HK</div><div class="n" id="rHK">0</div></div><div class="stat"><div class="small">FB</div><div class="n" id="rFB">0</div></div><div class="stat"><div class="small">ENG</div><div class="n" id="rENG">0</div></div></div><div class="panel"><h2 class="section-title">ประวัติงานที่ปิดแล้ว</h2><div id="logList"></div></div></div><dialog id="taskDialog"><div class="body"><div id="taskDetail"></div><div class="actions"><button class="ghost" onclick="taskDialog.close()">ปิด</button></div></div></dialog><script src="firebase-config.js"></script><script src="users-config.js"></script><script src="firebase-helpers.js"></script><script src="common.js"></script><script>const session=loadSession();if(!session)location.href='index.html';welcome.textContent='ผู้ใช้งาน: '+session.name+' ('+session.role+')';logoutBtn.onclick=logout;enablePushBtn.onclick=()=>enableNotificationsForCurrentUser(session,'firebaseStatus');window.openTask=async id=>{await renderTaskDetail(id,'taskDetail','logs');taskDialog.showModal()};
async function render(dataOverride){const data=dataOverride||await getData();const logs=data.logs||[];rAll.textContent=logs.length;rHK.textContent=logs.filter(x=>x.targetDepartment==='HK').length;rFB.textContent=logs.filter(x=>x.targetDepartment==='FB').length;rENG.textContent=logs.filter(x=>x.targetDepartment==='ENG').length;logList.innerHTML=logs.map(t=>`<article class="task"><h4>${escapeHtml(t.title)} <span class="dept-tag">${escapeHtml(t.targetDepartment||'-')}</span></h4><div class="meta">${escapeHtml(taskLocationText(t))}</div><div class="meta">FO: ${escapeHtml(t.requestedBy||'-')} • คนทำงาน: ${escapeHtml(t.assignee||'-')} • เวลา: ${t.totalMinutes||0} นาที</div><div class="actions"><button onclick="openTask('${t.id}')">ดูรายละเอียด</button></div></article>`).join('')||'<div class="small">ยังไม่มี log</div>'}
;(async()=>{setFirebaseStatus('firebaseStatus','checking');const fb=await checkFirebaseConnection();if(fb.ok)setFirebaseStatus('firebaseStatus','connected',fb.detail);else setFirebaseStatus('firebaseStatus',fb.mode,fb.detail);await render();if(isFirebaseReady()){const wait=setInterval(()=>{if(window.firebaseHelpers?.subscribe){clearInterval(wait);window.firebaseHelpers.subscribe(render)}},500)}})();</script></body></html>
