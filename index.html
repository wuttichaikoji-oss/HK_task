<!doctype html><html lang="th"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>HK x FO Login</title>
<link rel="manifest" href="manifest.json"><link rel="stylesheet" href="styles.css">
</head><body>
<header><div class="wrap"><strong>Housekeeping × Front Office Task Board v1.6</strong></div></header>
<div class="wrap center">
  <div class="panel">
    <div class="hero">
      <h1>เข้าสู่ระบบ</h1>
      <p class="small">พนักงานทั่วไปจะเห็นเฉพาะหน้าบอร์ดรวม และกดเข้าไปส่งงานได้ ส่วนรหัสหัวหน้าจะเข้าไป assign งานในหน้าหัวหน้างานได้</p>
    </div>
    <div class="grid">
      <div>
        <label>รหัสพนักงาน / รหัสหัวหน้า</label>
        <input id="code" type="password" placeholder="เช่น 1111 หรือ 9000">
      </div>
      <button id="loginBtn">เข้าสู่ระบบ</button>
      <div class="notice">
        <div><strong>โหมดระบบ</strong>: <span id="modeText">กำลังตรวจสอบ...</span></div>
        <div class="small">รายชื่อและรหัสแก้ไขได้ในไฟล์ <code>users-config.js</code></div>
      </div>
      <div class="notice">
        <div><strong>รหัสทดลอง</strong></div>
        <div id="demoUsers"></div>
      </div>
    </div>
  </div>
</div>
<script src="firebase-config.js"></script>
<script src="users-config.js"></script>
<script src="firebase-helpers.js"></script>
<script src="common.js"></script>
<script>
(async ()=>{
  await seedData();
  requestNotify();
  document.getElementById('modeText').textContent = window.FIREBASE_ENABLED ? 'Firebase Realtime Mode' : 'Local Demo Mode';
  document.getElementById('demoUsers').innerHTML = USERS.map(u => `${u.name} = ${u.code} (${u.role})`).join('<br>');
  const session = loadSession();
  if(session){ location.href = session.role === 'supervisor' ? 'supervisor.html' : 'board.html'; }
})();
document.getElementById('loginBtn').addEventListener('click', ()=>{
  const ok = login(document.getElementById('code').value);
  if(!ok) alert('รหัสไม่ถูกต้อง');
});
document.getElementById('code').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('loginBtn').click(); });
</script>
</body></html>
