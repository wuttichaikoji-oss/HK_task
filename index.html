<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Laya Multi Department Task App</title><link rel="stylesheet" href="styles.css"></head><body><header><div class="wrap row space"><div><div class="top-title">Laya Multi Department Task App</div><div id="welcome" class="small"></div></div><div class="row"><button class="ghost" id="logoutBtn">ออกจากระบบ</button></div></div></header><div class="wrap center"><div class="panel"><div class="hero"><h1>เข้าสู่ระบบ</h1><p class="small">ระบบ FO จ่ายงานไปยัง HK / FB / ENG และมี Supervisor แยกตามแผนก พร้อมหน้า Manager</p></div><div class="grid"><div><label>รหัสล็อกอิน</label><input id="code" type="password" placeholder="เช่น 1001 / 9900"></div><button id="loginBtn">เข้าสู่ระบบ</button><div id="firebaseStatus" class="firebase-inline"></div><div class="notice"><div><strong>รหัสเริ่มต้น</strong></div><div id="demoUsers"></div></div></div></div></div><script src="firebase-config.js"></script><script src="users-config.js"></script><script src="firebase-helpers.js"></script><script src="common.js"></script><script>document.getElementById('logoutBtn').onclick=logout;(async()=>{await ensureUsers();await seedData();const users=await getUsers();demoUsers.innerHTML=users.map(u=>`${u.name} = ${u.code} (${u.role})`).join('<br>');setFirebaseStatus('firebaseStatus','checking');const fb=await checkFirebaseConnection();if(fb.ok)setFirebaseStatus('firebaseStatus','connected',fb.detail);else setFirebaseStatus('firebaseStatus',fb.mode,fb.detail);})();loginBtn.onclick=async()=>{const ok=await login(code.value);if(!ok)alert('รหัสไม่ถูกต้อง')};code.addEventListener('keydown',e=>{if(e.key==='Enter')loginBtn.click()});</script></body></html>
