<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ENGINEERING DEPARTMENT</title><link rel="stylesheet" href="styles.css"></head><body><header><div class="wrap row space"><div><div class="top-title">ENGINEERING DEPARTMENT</div><div id="welcome" class="small"></div></div><div class="row"><button class="ghost" id="enablePushBtn">เปิดแจ้งเตือน</button><button class="ghost" id="logoutBtn">ออกจากระบบ</button></div></div></header><div class="wrap grid grid-2"><div class="panel"><div class="section-head"><h2 class="section-title">งานของแผนก ENG</h2><div id="firebaseStatus" class="firebase-inline"></div></div><div class="note-box">แผนก ENG รับงานจาก Supervisor ENG และอัปเดตงานแบบเดียวกับ HK เดิม</div><div class="stats"><div class="stat"><div class="small">งานใหม่</div><div class="n" id="kNew">0</div></div><div class="stat"><div class="small">กำลังทำ</div><div class="n" id="kProg">0</div></div><div class="stat"><div class="small">รอ FO ปิดงาน</div><div class="n" id="kDone">0</div></div><div class="stat"><div class="small">ทั้งหมด</div><div class="n" id="kAll">0</div></div></div><div id="deptTasks"></div></div><div class="panel"><h2 class="section-title">อัปเดตงาน</h2><form id="submitForm" class="grid"><div><label>เลือกงาน</label><select id="taskId"></select></div><div><label>เปลี่ยนสถานะ</label><select id="status"><option>In Progress</option><option>Done by Department</option></select></div><div><label>คอมเมนต์</label><textarea id="comment"></textarea></div><div><label>อัปโหลดรูปผลงาน <span class="small">(บังคับถ้าจะส่งงานเสร็จ)</span></label><input id="images" type="file" accept="image/*" multiple></div><button class="good">บันทึกและส่งงาน</button></form></div></div><dialog id="taskDialog"><div class="body"><div id="taskDetail"></div><div class="actions"><button class="ghost" onclick="taskDialog.close()">ปิด</button></div></div></dialog>
<div id="popupMount"></div><script src="firebase-config.js"></script><script src="users-config.js"></script><script src="firebase-helpers.js"></script><script src="common.js"></script><script>const session=requireRole('eng');welcome.textContent='ผู้ใช้งาน: '+session.name;logoutBtn.onclick=logout;enablePushBtn.onclick=()=>enableNotificationsForCurrentUser(session,'firebaseStatus');const uploadState={};let __lastStatusMap=new Map();

document.getElementById('popupMount').innerHTML = popupMarkup();
let __popupSeen = new Set();
function handleDeptPopup(tasks){
  const currentIds = new Set((tasks||[]).map(t=>t.id));
  for(const t of (tasks||[])){
    if(!__popupSeen.has(t.id) && t.status === 'New from FO' && t.targetDepartment === 'ENG'){
      openDeptPopup(t, 'eng.html');
      break;
    }
  }
  __popupSeen = currentIds;
}

async function visibleTasks(dataOverride){const data=dataOverride||await getData();return (data.tasks||[]).filter(t=>t.targetDepartment==='ENG'&&(!t.assignee||t.assignee===session.name||['New from FO','In Progress','Done by Department'].includes(t.status)))}
function taskButtons(t){const s=t.status;if(s==='New from FO')return `<div class="actions"><button onclick="openTask('${t.id}')">ดูรายละเอียด</button><button class="good" onclick="quickStart('${t.id}')">เริ่มทำงาน</button></div>`;if(s==='In Progress'){const staged=!!uploadState[t.id];return `<div class="actions"><button onclick="openTask('${t.id}')">ดูรายละเอียด</button>${!staged?`<button class="warn" onclick="showUploadForDone('${t.id}')">ทำงานเสร็จแล้ว</button>`:''}<input id="upload-${t.id}" type="file" accept="image/*" multiple style="${staged?'display:block;max-width:220px;':'display:none;'}"><button id="send-${t.id}" class="good" onclick="sendToDone('${t.id}')" style="${staged?'display:inline-block;':'display:none;'}">ส่งงาน</button></div>`}return `<div class="actions"><button onclick="openTask('${t.id}')">ดูรายละเอียด</button></div>`}
async function detectStatusUpdates(tasks){let changed=false;for(const t of(tasks||[])){const prev=__lastStatusMap.get(t.id);if(prev&&prev!==t.status){changed=true;break}}__lastStatusMap=new Map((tasks||[]).map(t=>[t.id,t.status]));if(changed)vibrateStatusUpdate()}
async function render(dataOverride){const data=dataOverride||await getData();const tasks=await visibleTasks(data);handleDeptPopup(tasks);await detectStatusUpdates(tasks);kNew.textContent=tasks.filter(t=>t.status==='New from FO').length;kProg.textContent=tasks.filter(t=>t.status==='In Progress').length;kDone.textContent=tasks.filter(t=>t.status==='Done by Department').length;kAll.textContent=tasks.length;deptTasks.innerHTML=tasks.map(t=>`<article class="task"><h4>${escapeHtml(t.title)}</h4><div class="meta">${escapeHtml(taskLocationText(t))}</div><div class="meta">FO: ${escapeHtml(t.requestedBy||'-')} • Assigned by: ${escapeHtml(t.assignedBy||'-')} • สถานะ: ${escapeHtml(t.status)}</div><div class="badges">${statusBadge(t)}</div>${taskButtons(t)}</article>`).join('')||'<div class="small">ยังไม่มีงาน</div>';const editable=tasks.filter(t=>['New from FO','In Progress'].includes(t.status));taskId.innerHTML=editable.map(t=>`<option value="${t.id}">${escapeHtml(t.title)} (${escapeHtml(t.room||'-')})</option>`).join('')}
window.openTask=async id=>{await renderTaskDetail(id,'taskDetail','tasks');taskDialog.showModal()};window.quickStart=async id=>{const tasks=await getTasks();const t=tasks.find(x=>x.id===id);if(!t||t.status!=='New from FO')return;t.status='In Progress';t.assignee=session.name;t.startedAt=t.startedAt||new Date().toISOString();t.comments=t.comments||[];t.comments.unshift({at:new Date().toISOString(),by:session.name,text:'เริ่มดำเนินการ'});await updateTask(t);await render()};window.showUploadForDone=function(id){uploadState[id]=true;const input=document.getElementById('upload-'+id);const btn=document.getElementById('send-'+id);if(input)input.style.display='block';if(btn)btn.style.display='inline-block';};window.sendToDone=async function(id){const tasks=await getTasks();const t=tasks.find(x=>x.id===id);if(!t||t.status!=='In Progress')return;const input=document.getElementById('upload-'+id);if(!input||!input.files.length){alert('กรุณาอัปโหลดรูปผลงานก่อนส่งงาน');return}const imgs=await readFiles(input.files);t.images=t.images||[];t.images.unshift(...imgs);t.status='Done by Department';t.assignee=session.name;t.doneAt=new Date().toISOString();t.comments=t.comments||[];t.comments.unshift({at:new Date().toISOString(),by:session.name,text:'ทำเสร็จแล้วและอัปโหลดรูปผลงาน'});await updateTask(t);delete uploadState[id];await render()};
submitForm.addEventListener('submit',async e=>{e.preventDefault();const id=taskId.value;const tasks=await getTasks();const t=tasks.find(x=>x.id===id);if(!t)return;if(status.value==='Done by Department'&&(!images.files||!images.files.length)){alert('กรุณาอัปโหลดรูปผลงานก่อนส่งงาน');return}t.status=status.value;t.assignee=session.name;if(status.value==='In Progress'&&!t.startedAt)t.startedAt=new Date().toISOString();if(status.value==='Done by Department')t.doneAt=new Date().toISOString();const imgs=await readFiles(images.files||[]);t.images=t.images||[];t.images.unshift(...imgs);t.comments=t.comments||[];if(comment.value.trim())t.comments.unshift({at:new Date().toISOString(),by:session.name,text:comment.value.trim()});await updateTask(t);submitForm.reset();await render()})
;(async()=>{setFirebaseStatus('firebaseStatus','checking');const fb=await checkFirebaseConnection();if(fb.ok)setFirebaseStatus('firebaseStatus','connected',fb.detail);else setFirebaseStatus('firebaseStatus',fb.mode,fb.detail);await ensureUsers();await seedData();const first=await getData();const firstTasks = await visibleTasks(first); initializeSeenTasks(firstTasks); __popupSeen = new Set(firstTasks.map(t=>t.id)); await render(first);if(isFirebaseReady()){const wait=setInterval(()=>{if(window.firebaseHelpers?.subscribe){clearInterval(wait);window.firebaseHelpers.subscribe(async data=>{const relevant=await visibleTasks(data);alertForNewTasks(relevant);await render(data);const fb2=await checkFirebaseConnection();if(fb2.ok)setFirebaseStatus('firebaseStatus','connected',fb2.detail)})}},500)}})();</script></body></html>
