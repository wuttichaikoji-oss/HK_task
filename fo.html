<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>FRONT OFFICE</title><link rel="stylesheet" href="styles.css"></head><body><header><div class="wrap row space"><div><div class="top-title">FRONT OFFICE</div><div id="welcome" class="small"></div></div><div class="row"><a href="fo.html" class="ghost">FO</a><a href="board.html" class="ghost">บอร์ดรวม</a><button class="ghost" id="enablePushBtn">เปิดแจ้งเตือน</button><button class="ghost" id="logoutBtn">ออกจากระบบ</button></div></div></header><div class="wrap grid grid-2"><div class="panel"><div class="section-head"><h2 class="section-title">เปิดงานไปยัง 3 แผนก</h2><div id="firebaseStatus" class="firebase-inline"></div></div><form id="taskForm" class="grid"><div><label>ชื่องาน</label><input id="title" required></div><div><label>รายละเอียด</label><textarea id="desc"></textarea></div><div class="grid grid-4"><div><label>แผนกปลายทาง</label><select id="targetDepartment"><option>HK</option><option>FB</option><option>ENG</option></select></div><div><label>เลขห้อง/พื้นที่</label><input id="room" placeholder="เช่น A105"></div><div><label>ประเภทงาน</label><input id="taskType" placeholder="เช่น Room Ready"></div><div><label>Priority</label><select id="priority"><option>Medium</option><option>High</option><option>Urgent</option></select></div></div><button class="good">ส่งงาน</button></form></div><div class="panel"><h2 class="section-title">งานที่ FO เปิด</h2><div id="foTasks"></div></div></div><dialog id="taskDialog"><div class="body"><div id="taskDetail"></div><div class="actions"><button class="ghost" onclick="taskDialog.close()">ปิด</button></div></div></dialog><script src="firebase-config.js"></script><script src="users-config.js"></script><script src="firebase-helpers.js"></script><script src="common.js"></script><script>const session=requireRole('fo');welcome.textContent='ผู้ใช้งาน: '+session.name;logoutBtn.onclick=logout;enablePushBtn.onclick=()=>enableNotificationsForCurrentUser(session,'firebaseStatus');
async function render(dataOverride){const data=dataOverride||await getData();const tasks=(data.tasks||[]).filter(t=>t.requestedBy===session.name);foTasks.innerHTML=tasks.map(t=>`<article class="task"><h4>${escapeHtml(t.title)} <span class="dept-tag">${escapeHtml(t.targetDepartment)}</span></h4><div class="meta">${escapeHtml(taskLocationText(t))}</div><div class="meta">Assigned by: ${escapeHtml(t.assignedBy||'-')} • คนทำงาน: ${escapeHtml(t.assignee||'-')} • สถานะ: ${escapeHtml(t.status)}</div><div class="badges">${statusBadge(t)}</div><div class="actions"><button onclick="openTask('${t.id}','tasks')">ดู</button><button class="good" ${t.status==='Done by Department'?'':'disabled'} onclick="closeJob('${t.id}')">Close job</button></div></article>`).join('')||'<div class="small">ยังไม่มีงาน</div>'}
window.openTask=async(id,source='tasks')=>{await renderTaskDetail(id,'taskDetail',source);taskDialog.showModal()};window.closeJob=async id=>{await closeTaskToLog(id,session.name);await render()}
taskForm.addEventListener('submit',async e=>{e.preventDefault();const dept=targetDepartment.value;const supervisor=dept==='HK'?'Supervisor HK':dept==='FB'?'Supervisor FB':'Supervisor ENG';const task={id:uid(),title:title.value.trim(),desc:desc.value.trim(),outlet:'Hotel',room:room.value.trim().toUpperCase(),taskType:taskType.value.trim(),requestedBy:session.name,assignedBy:supervisor,targetDepartment:dept,assignee:'',priority:priority.value,status:'New from FO',createdAt:new Date().toISOString(),pushEnabled:true,comments:[{at:new Date().toISOString(),by:session.name,text:'FO เปิดงานใหม่'}]};await updateTask(task);taskForm.reset();await render()})
;(async()=>{setFirebaseStatus('firebaseStatus','checking');const fb=await checkFirebaseConnection();if(fb.ok)setFirebaseStatus('firebaseStatus','connected',fb.detail);else setFirebaseStatus('firebaseStatus',fb.mode,fb.detail);await ensureUsers();await seedData();await render();if(isFirebaseReady()){const wait=setInterval(()=>{if(window.firebaseHelpers?.subscribe){clearInterval(wait);window.firebaseHelpers.subscribe(render)}},500)}})();</script></body></html>
