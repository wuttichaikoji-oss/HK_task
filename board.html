<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>MULTI DEPARTMENT BOARD</title><link rel="stylesheet" href="styles.css"></head><body><header><div class="wrap row space"><div><div class="top-title">MULTI DEPARTMENT BOARD</div><div id="welcome" class="small"></div></div><div class="row"><a href="board.html" class="ghost">บอร์ดรวม</a><button class="ghost" id="enablePushBtn">เปิดแจ้งเตือน</button><button class="ghost" id="logoutBtn">ออกจากระบบ</button></div></div></header><div class="wrap"><div id="firebaseStatus" class="firebase-inline" style="margin-bottom:14px;"></div><div class="stats"><div class="stat"><div class="small">งานทั้งหมด</div><div class="n" id="sAll">0</div></div><div class="stat"><div class="small">HK</div><div class="n" id="sHK">0</div></div><div class="stat"><div class="small">FB</div><div class="n" id="sFB">0</div></div><div class="stat"><div class="small">ENG</div><div class="n" id="sENG">0</div></div></div><div id="board" class="board"></div><div class="panel" style="margin-top:18px;"><h2 class="section-title">LOG Detail</h2><div id="logList" class="log-accordion"></div></div></div><dialog id="taskDialog"><div class="body"><div id="taskDetail"></div><div class="actions"><button class="ghost" onclick="taskDialog.close()">ปิด</button></div></div></dialog><script src="firebase-config.js"></script><script src="users-config.js"></script><script src="firebase-helpers.js"></script><script src="common.js"></script><script>const session=loadSession();if(!session)location.href='index.html';welcome.textContent='ผู้ใช้งาน: '+session.name+' ('+session.role+')';logoutBtn.onclick=logout;enablePushBtn.onclick=()=>enableNotificationsForCurrentUser(session,'firebaseStatus');
function taskCard(t){const canClose=session.role==='fo'&&t.status==='Done by Department';return `<article class="task"><h4>${escapeHtml(t.title)} <span class="dept-tag">${escapeHtml(t.targetDepartment)}</span></h4><div class="meta">${escapeHtml(taskLocationText(t))}</div><div class="meta">FO: ${escapeHtml(t.requestedBy||'-')} • Assigned by: ${escapeHtml(t.assignedBy||'-')} • คนทำงาน: ${escapeHtml(t.assignee||'-')}</div><div class="badges">${statusBadge(t)}</div><div class="actions"><button onclick="openTask('${t.id}','tasks')">ดูรายละเอียด</button>${canClose?`<button class="good" onclick="closeJob('${t.id}')">Close job</button>`:''}</div></article>`}
function logRow(t){return `<div class="log-item"><div class="log-summary" onclick="toggleLog('${t.id}')"><div><div class="log-title">${escapeHtml(t.title)} <span class="dept-tag">${escapeHtml(t.targetDepartment||'-')}</span></div><div class="log-meta">${escapeHtml(taskLocationText(t))} • ปิดงาน ${fmtDate(t.closedAt)} • ${t.totalMinutes||0} นาที</div></div><div class="log-chevron" id="chev-${t.id}">▾</div></div><div class="log-content hidden" id="cnt-${t.id}"><div class="meta">FO: ${escapeHtml(t.requestedBy||'-')} • คนทำงาน: ${escapeHtml(t.assignee||'-')}</div><div class="actions"><button onclick="openTask('${t.id}','logs')">ดูรายละเอียดเต็ม</button></div></div></div>`}
window.toggleLog=id=>{const c=document.getElementById('cnt-'+id),v=document.getElementById('chev-'+id);if(!c)return;const hidden=c.classList.toggle('hidden');v.textContent=hidden?'▾':'▴'};window.openTask=async(id,source='tasks')=>{await renderTaskDetail(id,'taskDetail',source);taskDialog.showModal()};window.closeJob=async id=>{await closeTaskToLog(id,session.name);await render()}
async function render(dataOverride){const data=dataOverride||await getData();const tasks=data.tasks||[],logs=data.logs||[];sAll.textContent=tasks.length;sHK.textContent=tasks.filter(t=>t.targetDepartment==='HK').length;sFB.textContent=tasks.filter(t=>t.targetDepartment==='FB').length;sENG.textContent=tasks.filter(t=>t.targetDepartment==='ENG').length;board.innerHTML=['HK','FB','ENG'].map(dep=>`<section class="column"><h3>${dep} <span class="small">(${tasks.filter(t=>t.targetDepartment===dep).length})</span></h3>${tasks.filter(t=>t.targetDepartment===dep).map(taskCard).join('')||'<div class="small">ไม่มีงาน</div>'}</section>`).join('');logList.innerHTML=logs.length?logs.slice(0,20).map(logRow).join(''):'<div class="small">ยังไม่มีงานที่ปิดแล้ว</div>'}
;(async()=>{setFirebaseStatus('firebaseStatus','checking');const fb=await checkFirebaseConnection();if(fb.ok)setFirebaseStatus('firebaseStatus','connected',fb.detail);else setFirebaseStatus('firebaseStatus',fb.mode,fb.detail);await ensureUsers();await seedData();await render();if(isFirebaseReady()){const wait=setInterval(()=>{if(window.firebaseHelpers?.subscribe){clearInterval(wait);window.firebaseHelpers.subscribe(render)}},500)}})();</script></body></html>
