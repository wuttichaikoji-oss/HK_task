<!doctype html><html lang="th"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>บอร์ดรวมงาน</title><link rel="stylesheet" href="styles.css"></head><body>
<header><div class="wrap row space topbar">
  <div><strong>บอร์ดรวมงาน</strong> <span id="welcome" class="small"></span></div>
  <div>
    <a class="ghost" href="board.html">บอร์ดรวม</a>
    <a class="ghost" href="staff.html">ส่งงานของฉัน</a>
    <button class="ghost" id="logoutBtn">ออกจากระบบ</button>
  </div>
</div></header>
<div class="wrap">
  <div class="panel">
    <div class="row space">
      <div class="tabs">
        <button class="tablink" id="refreshBtn">รีเฟรช</button>
      </div>
      <div class="small">ทุกคนเห็นบอร์ดรวมได้ แต่พนักงานจะเข้าไป Assign งานไม่ได้</div>
    </div>
  </div>
  <div class="stats" style="margin:16px 0">
    <div class="stat"><div class="small">งานทั้งหมด</div><div class="n" id="sAll">0</div></div>
    <div class="stat"><div class="small">กำลังทำ</div><div class="n" id="sProg">0</div></div>
    <div class="stat"><div class="small">รอตรวจ</div><div class="n" id="sWait">0</div></div>
    <div class="stat"><div class="small">เกินเวลา</div><div class="n" id="sOver">0</div></div>
  </div>
  <div id="board" class="board"></div>
</div>
<dialog id="taskDialog"><div class="body"><div id="taskDetail"></div>
  <div class="actions">
    <a href="staff.html"><button class="good">ไปหน้าส่งงาน</button></a>
    <button class="ghost" onclick="document.getElementById('taskDialog').close()">ปิด</button>
  </div>
</div></dialog>
<script src="firebase-config.js"></script>
<script src="users-config.js"></script>
<script src="firebase-helpers.js"></script>
<script src="common.js"></script>
<script>
const session = requireRole('staff');
document.getElementById('welcome').textContent = '— ' + session.name;
document.getElementById('logoutBtn').onclick = logout;

function card(t){
  return `
  <article class="task">
    <h4>${escapeHtml(t.title)}</h4>
    <div class="meta">ห้อง/พื้นที่: ${escapeHtml(t.room||'-')}</div>
    <div class="meta">ผู้รับผิดชอบ: ${escapeHtml(t.assignee||'-')}</div>
    <div class="meta">แผนก: ${escapeHtml(t.department||'-')}</div>
    <div class="badges">${statusBadge(t)}</div>
    <div class="actions">
      <button onclick="openTask('${t.id}')">ดูรายละเอียด</button>
      <a href="staff.html"><button class="good">ส่งงาน</button></a>
    </div>
  </article>`;
}
async function render(tasksOverride){
  const tasks = tasksOverride || await getTasks();
  document.getElementById('sAll').textContent = tasks.length;
  document.getElementById('sProg').textContent = tasks.filter(t=>t.status==='In Progress').length;
  document.getElementById('sWait').textContent = tasks.filter(t=>t.status==='Waiting Approval').length;
  document.getElementById('sOver').textContent = tasks.filter(isOverdue).length;
  document.getElementById('board').innerHTML = STATUSES.map(s=>{
    const items = tasks.filter(t=>t.status===s);
    return `<section class="column"><h3>${s} <span class="small">(${items.length})</span></h3>${items.map(card).join('') || '<div class="small">ไม่มีงาน</div>'}</section>`;
  }).join('');
}
window.openTask = async function(id){
  await renderTaskDetail(id, 'taskDetail');
  document.getElementById('taskDialog').showModal();
}
document.getElementById('refreshBtn').onclick = ()=>render();
(async ()=>{
  requestNotify();
  await seedData();
  await render();
  if(isFirebaseReady()){
    const wait = setInterval(()=>{
      if(window.firebaseHelpers?.subscribe){
        clearInterval(wait);
        window.firebaseHelpers.subscribe(render);
      }
    }, 500);
  }
})();
</script></body></html>
