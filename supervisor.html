<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Supervisor</title><link rel="stylesheet" href="styles.css"></head><body>
<header><div class="wrap row space"><div><strong>Supervisor</strong> <span id="welcome" class="small"></span></div><div class="row"><a href="board.html" class="ghost">บอร์ดรวม</a><a href="fo.html" class="ghost">หน้า FO</a><a href="hk.html" class="ghost">หน้า HK</a><button class="ghost" id="logoutBtn">ออกจากระบบ</button></div></div></header>
<div class="wrap"><div class="panel"><h2 style="margin-top:0">ภาพรวมระบบ FO → HK</h2><p>หน้านี้ใช้สำหรับดูภาพรวมทั้งหมด โดยหัวใจของระบบคือ Front Office เปิดงาน และ HouseKeeping เป็นผู้รับงาน/ดำเนินการ/ส่งกลับ</p><div id="allTasks"></div></div></div>
<script src="firebase-config.js"></script><script src="users-config.js"></script><script src="firebase-helpers.js"></script><script src="common.js"></script>
<script>
const session=requireRole('supervisor');
document.getElementById('welcome').textContent='— '+session.name;
document.getElementById('logoutBtn').onclick=logout;
async function render(tasksOverride){const tasks=tasksOverride||await getTasks();document.getElementById('allTasks').innerHTML=tasks.map(t=>`<article class="task"><h4>${escapeHtml(t.title)}</h4><div class="meta">${escapeHtml(taskLocationText(t))}</div><div class="meta">FO: ${escapeHtml(t.requestedBy||'-')} • HK: ${escapeHtml(t.assignee||'-')} • สถานะ: ${escapeHtml(t.status)}</div></article>`).join('')||'<div class="small">ยังไม่มีงาน</div>'}
(async()=>{await seedData();await render();if(isFirebaseReady()){const wait=setInterval(()=>{if(window.firebaseHelpers?.subscribe){clearInterval(wait);window.firebaseHelpers.subscribe(render)}},500)}})();
</script></body></html>
