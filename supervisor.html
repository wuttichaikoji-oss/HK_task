<!doctype html><html lang="th"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>หน้าหัวหน้างาน</title><link rel="stylesheet" href="styles.css"></head><body>
<header><div class="wrap row space">
  <div><strong>หน้าหัวหน้างาน</strong> <span id="welcome" class="small"></span></div>
  <div>
    <a href="supervisor.html"><button class="ghost">Assign งาน</button></a>
    <button class="ghost" id="logoutBtn">ออกจากระบบ</button>
  </div>
</div></header>
<div class="wrap grid grid-2">
  <div class="panel">
    <h2 style="margin-top:0">สร้าง / Assign งาน</h2>
    <form id="taskForm" class="grid">
      <div><label>ชื่องาน</label><input id="title" required></div>
      <div class="grid grid-2">
        <div><label>เลขห้อง/พื้นที่</label><input id="room"></div>
        <div><label>ผู้รับผิดชอบ</label>
          <select id="assignee"></select>
        </div>
      </div>
      <div><label>รายละเอียด</label><textarea id="desc"></textarea></div>
      <div class="grid grid-3">
        <div><label>แผนก</label><select id="department"><option>Housekeeping</option><option>Front Office</option><option>Housekeeping x Front Office</option></select></div>
        <div><label>ประเภทงาน</label><select id="taskType"><option>Room Ready</option><option>Guest Request</option><option>Room Status Update</option><option>Lost & Found</option><option>Public Area</option></select></div>
        <div><label>Priority</label><select id="priority"><option>Medium</option><option>High</option><option>Urgent</option></select></div>
      </div>
      <div class="grid grid-2">
        <div><label>สถานะห้อง</label><select id="roomStatus"><option>Vacant Dirty</option><option>Vacant Clean</option><option>Inspected</option><option>Occupied</option><option>OOO</option></select></div>
        <div><label>กำหนดเสร็จ</label><input id="dueAt" type="datetime-local"></div>
      </div>
      <button class="good">โพสต์งานลงบอร์ด</button>
    </form>
  </div>
  <div class="panel">
    <h2 style="margin-top:0">งานทั้งหมด</h2>
    <div id="allTasks"></div>
  </div>
</div>
<dialog id="taskDialog"><div class="body"><div id="taskDetail"></div><div class="actions"><button class="ghost" onclick="document.getElementById('taskDialog').close()">ปิด</button></div></div></dialog>
<script src="firebase-config.js"></script>
<script src="users-config.js"></script>
<script src="firebase-helpers.js"></script>
<script src="common.js"></script>
<script>
const session = requireRole('supervisor');
document.getElementById('welcome').textContent = '— ' + session.name;
document.getElementById('logoutBtn').onclick = logout;
document.getElementById('dueAt').value = nowIsoLocal();

function initAssigneeOptions(){
  const staffUsers = USERS.filter(u=>u.role==='staff');
  document.getElementById('assignee').innerHTML = '<option value="">-- ยังไม่ระบุ --</option>' + staffUsers.map(u=>`<option>${u.name}</option>`).join('');
}
async function render(tasksOverride){
  const tasks = tasksOverride || await getTasks();
  document.getElementById('allTasks').innerHTML = tasks.map(t=>`
    <article class="task">
      <h4>${escapeHtml(t.title)}</h4>
      <div class="meta">ห้อง/พื้นที่: ${escapeHtml(t.room||'-')} • ผู้รับผิดชอบ: ${escapeHtml(t.assignee||'-')}</div>
      <div class="badges">${statusBadge(t)}</div>
      <div class="actions">
        <button onclick="openTask('${t.id}')">ดู</button>
        <button class="good" onclick="setStatus('${t.id}','Approved')">ผ่านงาน</button>
        <button class="warn" onclick="setStatus('${t.id}','Rework')">ตีกลับ</button>
        <button class="secondary" onclick="reassign('${t.id}')">เปลี่ยนคนทำ</button>
        <button class="bad" onclick="removeTask('${t.id}')">ลบ</button>
      </div>
    </article>
  `).join('') || '<div class="small">ยังไม่มีงาน</div>';
}
window.openTask = async function(id){
  await renderTaskDetail(id, 'taskDetail');
  document.getElementById('taskDialog').showModal();
}
window.setStatus = async function(id,status){
  const tasks = await getTasks();
  const t = tasks.find(x=>x.id===id); if(!t) return;
  t.status = status;
  t.comments ||= [];
  t.comments.unshift({at:new Date().toISOString(), by:session.name, text: status==='Approved' ? 'หัวหน้ากดผ่านงาน' : 'หัวหน้าตีกลับงาน'});
  await updateTask(t);
  notify(`หัวหน้าอัปเดตงาน: ${t.title} → ${status}`);
  await render();
}
window.reassign = async function(id){
  const staffNames = USERS.filter(u=>u.role==='staff').map(u=>u.name).join(' / ');
  const name = prompt('ระบุชื่อผู้รับผิดชอบใหม่: ' + staffNames);
  if(!name) return;
  const tasks = await getTasks();
  const t = tasks.find(x=>x.id===id); if(!t) return;
  t.assignee = name.trim();
  t.status = 'Assigned';
  t.comments ||= [];
  t.comments.unshift({at:new Date().toISOString(), by:session.name, text:'Assign ใหม่ให้ ' + name.trim()});
  await updateTask(t);
  notify(`มีการมอบหมายงานใหม่: ${t.title} → ${name.trim()}`);
  await render();
}
window.removeTask = async function(id){
  if(!confirm('ลบงานนี้?')) return;
  await deleteTaskById(id);
  await render();
}
document.getElementById('taskForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const task = {
    id: uid(),
    title: document.getElementById('title').value.trim(),
    room: document.getElementById('room').value.trim(),
    desc: document.getElementById('desc').value.trim(),
    department: document.getElementById('department').value,
    taskType: document.getElementById('taskType').value,
    assignee: document.getElementById('assignee').value,
    priority: document.getElementById('priority').value,
    dueAt: document.getElementById('dueAt').value,
    roomStatus: document.getElementById('roomStatus').value,
    status: document.getElementById('assignee').value ? 'Assigned' : 'New',
    images: [], comments: [{at:new Date().toISOString(), by:session.name, text:'หัวหน้าสร้างงาน'}],
    createdBy: session.name, createdAt: new Date().toISOString()
  };
  await updateTask(task);
  document.getElementById('taskForm').reset();
  document.getElementById('dueAt').value = nowIsoLocal();
  notify(`มีงานใหม่ลงบอร์ด: ${task.title}`);
  await render();
});
(async ()=>{
  requestNotify();
  initAssigneeOptions();
  await seedData();
  await render();
  if(isFirebaseReady()){
    const wait = setInterval(()=>{
      if(window.firebaseHelpers?.subscribe){
        clearInterval(wait);
        window.firebaseHelpers.subscribe(render);
      }
    }, 500);
  }
})();
</script></body></html>
